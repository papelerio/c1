    <style>
        /* =========================================
           VARIABLES Y TIPOGRAFÍA
           ========================================= */
        :root { 
            --primary: #4a90e2; 
            --background: #f4f7f9; 
            --text: #2c3e50; 
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: var(--font-family); 
        }

        body { 
            background: var(--background); 
            color: var(--text); 
            padding: 15px; 
            padding-bottom: 90px; 
        }
        
        /* =========================================
           COMPONENTES PRINCIPALES (Área de Trabajo)
           ========================================= */
        .vignettes-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px; 
        }

        .card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        
        .card-header { 
            padding: 12px; 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            align-items: center; 
        }

        .card-body { 
            padding: 15px; 
        }
        
        /* =========================================
           FORMULARIOS E INPUTS
           ========================================= */
        .input-group { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 10px; 
        }

        .input-group div { 
            flex: 1; 
        }

        .input-group label { 
            font-size: 0.7rem; 
            color: #888; 
            display: block; 
            text-transform: uppercase; 
            margin-bottom: 2px; 
        }

        input, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            outline: none; 
            font-size: 1rem; 
            font-family: monospace; 
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus { 
            border-color: var(--primary); 
        }

        textarea { 
            resize: vertical; 
            min-height: 80px; 
        }
        
        /* =========================================
           RESULTADOS
           ========================================= */
        .res-item { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.95rem; 
            padding: 8px 0; 
            border-bottom: 1px dashed #eee; 
        }

        .res-item b { 
            color: var(--primary); 
        }

        .resultado-especial { 
            background: #f0f9ff; 
            padding: 12px; 
            border-radius: 8px; 
            margin-top: 10px; 
            text-align: center; 
            font-weight: bold; 
        }

        .resultado-especial b { 
            font-size: 1.2rem; 
            color: var(--text); 
        }

        .plantilla-especial-badge { 
            background: #1a1a1a; 
            color: white; 
            padding: 2px 8px; 
            border-radius: 12px; 
            font-size: 0.7rem; 
            margin-left: 8px; 
            vertical-align: middle;
        }

        /* =========================================
           BOTONES FLOTANTES
           ========================================= */
        .fab-container { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            display: flex; 
            gap: 12px; 
            z-index: 99; 
        }

        .fab { 
            width: 56px; 
            height: 56px; 
            border-radius: 50%; 
            border: none; 
            color: white; 
            font-size: 24px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            transition: transform 0.2s; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab:hover {
            transform: scale(1.05);
        }

        .fab:active { 
            transform: scale(0.9); 
        }

        .fab-primary { background: var(--primary); }
        .fab-success { background: #27ae60; }

        /* =========================================
           MODALES Y CONTENIDO INTERNO
           ========================================= */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.7); 
            z-index: 100; 
            padding: 15px; 
            overflow-y: auto; 
        }

        .modal-content { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            max-width: 500px; 
            margin: 20px auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .template-tag { 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            color: white; 
            font-weight: bold; 
            align-items: center; 
        }

        .icon-btn {
            background: transparent;
            border: 2px solid currentColor;
            opacity: 0.7;
            color: inherit;
            font-size: 1.4rem;
            width: 48px;
            height: 48px;
            min-width: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, opacity 0.2s;
            margin-left: 10px;
        }
        
        .icon-btn:hover {
            opacity: 1;
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        .btn { 
            padding: 12px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 10px; 
            font-size: 1rem; 
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }
        
        .field-row { 
            display: flex; 
            gap: 5px; 
            margin-bottom: 8px; 
            background: #f9f9f9; 
            padding: 8px; 
            border-radius: 8px; 
            align-items: center; 
        }

        .field-row input { 
            background: white; 
            border-width: 1px; 
            padding: 6px; 
        }

        .field-row .input-label { 
            flex: 1.2; 
        }

        .field-row .input-formula { 
            flex: 2; 
            font-family: monospace; 
        }
        
        /* Drag and Drop */
        .drag-icon {
            cursor: grab;
            margin-right: 8px;
            font-size: 1.2rem;
            user-select: none;
            touch-action: none; /* Asegura un agarre suave en móviles */
        }
        
        .drag-icon:active {
            cursor: grabbing;
        }

        .sortable-ghost {
            opacity: 0.4;
            transform: scale(0.98);
        }

        /* Utilidades de espaciado */
        .mb-2 { margin-bottom: 10px; }
        .mb-3 { margin-bottom: 15px; }
        .text-muted { color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- Contenedor Principal (Tarjetas / Viñetas) -->
    <div id="vignettesContainer" class="vignettes-grid"></div>

    <!-- Botones Flotantes -->
    <div class="fab-container">
        <button class="fab fab-success" onclick="openModal('mFirebase')" title="Sincronizar con Firebase" aria-label="Sincronizar">💾</button>
        <button class="fab fab-primary" onclick="openModal('mTemplates')" title="Gestionar Plantillas" aria-label="Plantillas">📄</button>
    </div>

    <!-- Modal: Lista de Plantillas -->
    <div id="mTemplates" class="modal">
        <div class="modal-content">
            <h2 class="mb-3">Plantillas</h2>
            <div id="listTemplates"></div>
            <button class="btn" style="background:#8e44ad; color:white" onclick="openTemplateEditor()">+ Nueva Plantilla</button>
            <button class="btn" style="background:#95a5a6; color:white" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <!-- Modal: Editor de Plantillas -->
    <div id="mEdit" class="modal">
        <div class="modal-content">
            <h3 id="edTitle" class="mb-2">Editor de Plantilla</h3>
            <input type="hidden" id="edId">
            
            <label class="text-muted">Nombre y Color:</label>
            <div style="display:flex; gap:5px; margin-bottom:15px">
                <input type="text" id="edName" placeholder="Nombre (ej: Vigas)">
                <input type="color" id="edColor" style="width:60px; height:45px; padding:2px; cursor:pointer;">
            </div>

            <div style="background:#eee; padding:10px; border-radius:10px; margin-bottom:15px">
                <p style="font-size:0.8rem; font-weight:bold; margin-bottom:5px">Variables a pedir (contexto opcional):</p>
                <div style="display:flex; gap:10px; margin-bottom:8px; align-items:center;">
                    <label style="min-width:40px; font-weight:bold;"><input type="checkbox" id="useX" checked disabled> X</label>
                    <input type="text" id="descX" placeholder="Ej: altura, metros" style="padding:6px; font-size:0.9rem; flex:1;">
                </div>
                <div style="display:flex; gap:10px; margin-bottom:8px; align-items:center;">
                    <label style="min-width:40px; font-weight:bold;"><input type="checkbox" id="useY"> Y</label>
                    <input type="text" id="descY" placeholder="Ej: base, kilos" style="padding:6px; font-size:0.9rem; flex:1;">
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <label style="min-width:40px; font-weight:bold;"><input type="checkbox" id="useZ"> Z</label>
                    <input type="text" id="descZ" placeholder="Ej: profundidad" style="padding:6px; font-size:0.9rem; flex:1;">
                </div>
            </div>

            <div id="edFields"></div>
            
            <button class="btn" style="background:#2ecc71; color:white" onclick="saveTemplate()">Guardar Cambios</button>
            <button id="btnDeleteTemp" class="btn" style="background:#e74c3c; color:white" onclick="deleteTemplate()">Eliminar Plantilla</button>
            <button class="btn" style="background:#95a5a6; color:white" onclick="openModal('mTemplates')">Cancelar</button>
        </div>
    </div>

    <!-- Modal: Firebase Sincronización -->
    <div id="mFirebase" class="modal">
        <div class="modal-content">
            <h3 class="mb-3">Sincronización</h3>
            <button class="btn" style="background:#3498db; color:white" onclick="syncFirebase('up')">⬆️ Subir a Firebase</button>
            <button class="btn" style="background:#27ae60; color:white" onclick="syncFirebase('down')">⬇️ Descargar de Firebase</button>
            <button class="btn" style="background:#95a5a6; color:white" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <script>
        /* =========================================
           CONFIGURACIÓN E INICIALIZACIÓN
           ========================================= */
        const firebaseConfig = { databaseURL: "https://autoformula-a2442-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Plantilla especial integrada (no editable, no eliminable)
        const PLANTILLA_ESPECIAL = {
            id: -1,
            n: '🧮 Calculadora Rápida',
            c: '#1a1a1a',
            useY: false,
            useZ: false,
            esEspecial: true,
            f: [{ l: 'Resultado', f: 'expresion' }]
        };

        /* =========================================
           ESTADO APLICACIÓN (Local Storage)
           ========================================= */
        let templates = JSON.parse(localStorage.getItem('t')) || [];
        if (!templates.some(t => t.id === -1)) {
            templates.unshift(PLANTILLA_ESPECIAL);
        }
        
        let vignettes = JSON.parse(localStorage.getItem('v')) || [];

        /* =========================================
           FUNCIONES DE UTILIDAD Y CÁLCULO
           ========================================= */
        function isDarkColor(hex) { 
            let r = parseInt(hex.slice(1,3), 16);
            let g = parseInt(hex.slice(3,5), 16);
            let b = parseInt(hex.slice(5,7), 16); 
            // Fórmula corregida para luminiscencia de colores
            return (r * 299 + g * 587 + b * 114) / 1000 < 128; 
        }

        function evaluarExpresion(expresion) {
            try {
                let limpia = expresion.trim();
                if (!limpia) return '0';
                limpia = limpia.replace(/\s/g, '');
                if (!/^[0-9+\-*/().]+$/.test(limpia)) {
                    throw new Error('Caracteres no permitidos');
                }
                const resultado = eval(limpia);
                if (isNaN(resultado) || !isFinite(resultado)) {
                    throw new Error('Resultado inválido');
                }
                
                // Formateo inteligente de resultados
                const strFull = resultado.toString();
                const partes = strFull.split('.');
                
                // Si es entero (no tiene punto o los decimales son 0 en JS)
                if (partes.length === 1) return strFull;
                
                // Si tiene 4 decimales o menos, mostramos el número tal cual (sin ceros extra al final)
                if (partes[1].length <= 4) return strFull;
                
                // Si tiene más de 4 decimales, redondeamos a 4 y ponemos puntos suspensivos
                // parseFloat elimina los ceros finales innecesarios del redondeo (ej: 3.1000 -> 3.1)
                const redondeado = parseFloat(resultado.toFixed(4)).toString();
                return redondeado + '...';
            } catch (e) {
                return 'Error en expresión';
            }
        }

        function evaluarFormula(formula, x, y, z) { 
            try { 
                // Añadido || 0 para manejar x como string vacía si el usuario borra el input
                return eval(formula.replace(/x/g, `(${x||0})`)
                                   .replace(/y/g, `(${y||0})`)
                                   .replace(/z/g, `(${z||0})`)).toFixed(2); 
            } catch { 
                return '...'; 
            }
        }

        /* =========================================
           LÓGICA DE INTERFAZ & MODALES
           ========================================= */
        const openModal = (id) => { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
            document.getElementById(id).style.display = 'block'; 
            if (id === 'mTemplates') renderTemplatesList(); 
        };
        
        const closeModal = () => {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        };

        /* =========================================
           MANEJO DE VIÑETAS (TARJETAS)
           ========================================= */
        function renderVignettes() {
            const container = document.getElementById('vignettesContainer');
            
            if (!vignettes.length) {
                container.innerHTML = '<p style="text-align:center;width:100%;color:#888;margin-top:40px">Sin viñetas. Toca 📄 para empezar.</p>';
                return;
            }
            
            container.innerHTML = '';
            
            vignettes.forEach(vignette => {
                const template = templates.find(temp => temp.id == vignette.tId);
                if (!template) return;
                
                if (template.esEspecial) {
                    renderSpecialVignette(container, vignette, template);
                } else {
                    renderNormalVignette(container, vignette, template);
                }
            });

            // Asignar listeners a los textareas después de renderizar dinámicamente
            vignettes.forEach(vignette => {
                const temp = templates.find(t => t.id == vignette.tId);
                if (temp && temp.esEspecial) {
                    const textarea = document.getElementById(`textarea-${vignette.id}`);
                    if (textarea) {
                        textarea.addEventListener('input', function() {
                            updateSpecialValue(vignette.id, this.value);
                        });
                    }
                }
            });
        }

        function renderSpecialVignette(container, vignette, template) {
            const expresionActual = (vignette.expresion || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const resultado = evaluarExpresion(vignette.expresion || '');
            
            container.innerHTML += `
                <div class="card" id="card-especial-${vignette.id}" data-id="${vignette.id}">
                    <div class="card-header" style="background:${template.c}; color:white">
                        <span style="display:flex; align-items:center;">
                            <span class="drag-icon" style="color: rgba(255,255,255,0.7)">☰</span>
                            ${template.n} <span class="plantilla-especial-badge">EXP自由</span>
                        </span>
                        <span onclick="deleteVignette(${vignette.id})" style="font-size:1.5rem; cursor:pointer" title="Eliminar">&times;</span>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <div style="flex:1">
                                <label>📐 Expresión Matemática</label>
                                <textarea id="textarea-${vignette.id}" placeholder="Ej: (145.163*5)+(220.512*3)+276.516">${expresionActual}</textarea>
                                <small style="color:#666; display:block; margin-top:5px">✅ Soporta: + - * / ( ) . y espacios</small>
                            </div>
                        </div>
                        <div class="resultado-especial">
                            🟰 <b id="res-especial-${vignette.id}">${resultado}</b>
                        </div>
                    </div>
                </div>`;
        }

        function renderNormalVignette(container, vignette, template) {
            const labelX = template.descX ? `X - ${template.descX}` : 'X';
            const placeX = template.descX ? `placeholder="${template.descX}"` : '';
            let inpHtml = `<div><label>${labelX}</label><input type="number" id="x-${vignette.id}" value="${vignette.x !== undefined ? vignette.x : ''}" ${placeX} oninput="updateValue(${vignette.id},'x',this.value)"></div>`;
            
            if (template.useY) {
                const labelY = template.descY ? `Y - ${template.descY}` : 'Y';
                const placeY = template.descY ? `placeholder="${template.descY}"` : '';
                inpHtml += `<div><label>${labelY}</label><input type="number" id="y-${vignette.id}" value="${vignette.y !== undefined ? vignette.y : ''}" ${placeY} oninput="updateValue(${vignette.id},'y',this.value)"></div>`;
            }
            if (template.useZ) {
                const labelZ = template.descZ ? `Z - ${template.descZ}` : 'Z';
                const placeZ = template.descZ ? `placeholder="${template.descZ}"` : '';
                inpHtml += `<div><label>${labelZ}</label><input type="number" id="z-${vignette.id}" value="${vignette.z !== undefined ? vignette.z : ''}" ${placeZ} oninput="updateValue(${vignette.id},'z',this.value)"></div>`;
            }

            let resHtml = template.f.map((f, i) => `
                <div class="res-item">
                    <span>${f.l}:</span>
                    <b id="r-${vignette.id}-${i}">${evaluarFormula(f.f, vignette.x, vignette.y, vignette.z)}</b>
                </div>
            `).join('');

            container.innerHTML += `
                <div class="card" data-id="${vignette.id}">
                    <div class="card-header" style="background:${template.c}; color:${isDarkColor(template.c) ? '#fff' : '#222'}">
                        <span style="display:flex; align-items:center;">
                            <span class="drag-icon" style="color:${isDarkColor(template.c) ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.5)'}">☰</span>
                            ${template.n}
                        </span>
                        <span onclick="deleteVignette(${vignette.id})" style="font-size:1.5rem; cursor:pointer" title="Eliminar">&times;</span>
                    </div>
                    <div class="card-body">
                        <div class="input-group">${inpHtml}</div>
                        <div>${resHtml}</div>
                    </div>
                </div>`;
        }

        function updateValue(id, key, val) {
            const vignette = vignettes.find(x => x.id == id);
            if (!vignette) return;
            
            // Si el valor está vacío, guardamos '' en lugar de 0 para que se visualice el placeholder
            vignette[key] = val === '' ? '' : (parseFloat(val) || 0);
            const template = templates.find(temp => temp.id == vignette.tId);
            
            template.f.forEach((f, i) => {
                const el = document.getElementById(`r-${vignette.id}-${i}`);
                if (el) el.innerText = evaluarFormula(f.f, vignette.x, vignette.y, vignette.z);
            });
            
            localStorage.setItem('v', JSON.stringify(vignettes));
        }

        function updateSpecialValue(id, expresion) {
            const vignette = vignettes.find(x => x.id == id);
            if (!vignette) return;
            
            vignette.expresion = expresion;
            localStorage.setItem('v', JSON.stringify(vignettes));
            
            // Actualizar UI del resultado de inmediato
            const resultado = evaluarExpresion(expresion || '');
            const resultadoSpan = document.getElementById(`res-especial-${id}`);
            if (resultadoSpan) {
                resultadoSpan.textContent = resultado;
            }
        }

        const spawnVignette = (templateId) => { 
            // Inician vacíos ('') para que los placeholders se muestren al agregar viñeta nueva
            const newVignette = { id: Date.now(), tId: templateId, x: '', y: '', z: '' };
            if (templateId === -1) {
                newVignette.expresion = '';
            }
            vignettes.push(newVignette); 
            localStorage.setItem('v', JSON.stringify(vignettes)); 
            renderVignettes(); 
            closeModal(); 
        };
        
        const deleteVignette = (id) => { 
            if(confirm('¿Eliminar esta calculadora?')) { 
                vignettes = vignettes.filter(x => x.id != id); 
                localStorage.setItem('v', JSON.stringify(vignettes)); 
                renderVignettes(); 
            }
        };

        /* =========================================
           MANEJO DE PLANTILLAS EN MODAL
           ========================================= */
        function renderTemplatesList() {
            const listContainer = document.getElementById('listTemplates');
            listContainer.innerHTML = '';
            
            templates.forEach(template => {
                if (template.esEspecial) {
                    listContainer.innerHTML += `
                        <div class="template-tag" style="background:${template.c}; opacity:0.9">
                            <span onclick="spawnVignette(${template.id})" style="flex:1; cursor:pointer">⭐ ${template.n}</span>
                            <span style="font-size:0.8rem; opacity:0.7">🔒 Especial</span>
                        </div>`;
                } else {
                    listContainer.innerHTML += `
                        <div class="template-tag" style="background:${template.c}; color:${isDarkColor(template.c) ? '#fff' : '#222'}">
                            <span onclick="spawnVignette(${template.id})" style="flex:1; cursor:pointer; display:flex; align-items:center;">📄 ${template.n}</span>
                            <button class="icon-btn" onclick="openTemplateEditor(${template.id})" title="Editar">✎</button>
                        </div>`;
                }
            });
        }

        function openTemplateEditor(id = null) {
            if (id === -1) {
                alert('❌ La plantilla especial no se puede editar');
                return;
            }
            
            openModal('mEdit');
            
            // Cargar datos (o valores por defecto si es una nueva)
            const template = templates.find(x => x.id == id) || { 
                id: '', n: '', c: '#4a90e2', useY: false, useZ: false, f: [{ l: '', f: '' }] 
            };
            
            document.getElementById('edId').value = template.id;
            document.getElementById('edName').value = template.n;
            document.getElementById('edColor').value = template.c;
            document.getElementById('useY').checked = template.useY;
            document.getElementById('useZ').checked = template.useZ;
            
            document.getElementById('descX').value = template.descX || '';
            document.getElementById('descY').value = template.descY || '';
            document.getElementById('descZ').value = template.descZ || '';
            
            // Mostrar botón eliminar solo si está editando una plantilla existente
            document.getElementById('btnDeleteTemp').style.display = (id && id !== -1) ? 'block' : 'none';
            
            // Cargar campos dinámicos de fórmulas
            const fieldsContainer = document.getElementById('edFields');
            fieldsContainer.innerHTML = '<p style="font-size:0.8rem; margin-bottom:5px; font-weight:bold">Fórmulas de Resultado:</p>';
            
            (template.f || []).forEach(f => addFormulaField(f.l, f.f));
            
            const btnAdd = document.createElement('button');
            btnAdd.className = 'btn';
            btnAdd.innerText = '+ Añadir Fórmula';
            btnAdd.onclick = () => addFormulaField();
            fieldsContainer.appendChild(btnAdd);
        }

        function addFormulaField(label = '', formula = '') {
            const div = document.createElement('div');
            div.className = 'field-row';
            div.innerHTML = `
                <input placeholder="Etiqueta" class="input-label" value="${label.replace(/"/g, '&quot;')}">
                <input placeholder="Fórmula" class="input-formula" value="${formula.replace(/"/g, '&quot;')}">
                <button onclick="this.parentElement.remove()" style="border:none; background:none; color:red; font-size:1.2rem; cursor:pointer;" title="Eliminar fórmula">&times;</button>
            `;
            const fCont = document.getElementById('edFields');
            fCont.insertBefore(div, fCont.lastElementChild);
        }

        function saveTemplate() {
            const idInputValue = document.getElementById('edId').value;
            const newId = idInputValue ? parseInt(idInputValue) : Date.now();
            
            if (newId === -1) {
                alert('❌ No se puede modificar la plantilla especial');
                return;
            }
            
            const fieldRows = Array.from(document.querySelectorAll('.field-row'));
            
            const newTemplate = {
                id: newId,
                n: document.getElementById('edName').value || 'Sin nombre',
                c: document.getElementById('edColor').value,
                useY: document.getElementById('useY').checked,
                useZ: document.getElementById('useZ').checked,
                descX: document.getElementById('descX').value,
                descY: document.getElementById('descY').value,
                descZ: document.getElementById('descZ').value,
                f: fieldRows.map(row => ({
                    l: row.querySelector('.input-label').value || '?',
                    f: row.querySelector('.input-formula').value.toLowerCase().replace(/\s/g, '')
                }))
            };

            const indexToUpdate = templates.findIndex(x => x.id === newId);
            if (indexToUpdate > -1) {
                templates[indexToUpdate] = newTemplate;
            } else {
                templates.push(newTemplate);
            }
            
            localStorage.setItem('t', JSON.stringify(templates));
            renderVignettes(); 
            openModal('mTemplates');
        }

        const deleteTemplate = () => { 
            const id = parseInt(document.getElementById('edId').value);
            if (id === -1) {
                alert('❌ No se puede eliminar la plantilla especial');
                return;
            }
            if(confirm('¿Seguro que deseas borrar esta plantilla?')) { 
                templates = templates.filter(x => x.id !== id); 
                localStorage.setItem('t', JSON.stringify(templates)); 
                openModal('mTemplates'); 
            } 
        };

        /* =========================================
           SINCRONIZACIÓN CON FIREBASE
           ========================================= */
        async function syncFirebase(mode) {
            try {
                // Sincronizar solo plantillas personalizadas y no la "Especial" (interna)
                const templatesToSync = templates.filter(t => !t.esEspecial);
                
                if (mode === 'up') {
                    await database.ref('plantillas').set(templatesToSync);
                    alert('✅ Subida a Firebase exitosa. Tus plantillas están en la nube.'); 
                } else { 
                    const snapshot = await database.ref('plantillas').once('value'); 
                    const loadedTemplates = Object.values(snapshot.val() || {});
                    templates = [PLANTILLA_ESPECIAL, ...loadedTemplates];
                    localStorage.setItem('t', JSON.stringify(templates)); 
                    alert('✅ Descarga desde Firebase exitosa.'); 
                }
                
                renderVignettes(); 
                closeModal();
            } catch (error) { 
                alert('❌ Error de sincronización: ' + error.message); 
            }
        }

        /* =========================================
           INICIALIZACIÓN
           ========================================= */
        // Iniciar la vista con las viñetas del Local Storage al cargar
        renderVignettes();

        // Configurar Drag and Drop para reorganizar viñetas
        const container = document.getElementById('vignettesContainer');
        Sortable.create(container, {
            animation: 150,
            handle: '.drag-icon', // Permite arrastrar solo desde el ícono para no interceptar clics en inputs
            ghostClass: 'sortable-ghost',
            onEnd: function (evt) {
                // Obtener el nuevo orden de los IDs de las tarjetas en el DOM
                const newOrderIds = Array.from(evt.to.children).map(child => parseInt(child.dataset.id));
                const newVignettesArray = [];
                
                // Reconstruir el array vignettes en el nuevo orden
                newOrderIds.forEach(id => {
                    const found = vignettes.find(v => v.id === id);
                    if (found) newVignettesArray.push(found);
                });
                
                // Actualizar estado y persistir en Local Storage
                vignettes = newVignettesArray;
                localStorage.setItem('v', JSON.stringify(vignettes));
            }
        });
    </script>
</body>
</html>
