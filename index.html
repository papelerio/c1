<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro Móvil</title>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --p: #4a90e2; --bg: #f4f7f9; --txt: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--txt); padding: 15px; padding-bottom: 90px; }
        
        /* Área de Trabajo */
        .vignettes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-h { padding: 12px; display: flex; justify-content: space-between; font-weight: bold; align-items: center; }
        .card-b { padding: 15px; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-group div { flex: 1; }
        .input-group label { font-size: 0.7rem; color: #888; display: block; text-transform: uppercase; margin-bottom: 2px; }
        input { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 8px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--p); }
        
        .res-item { display: flex; justify-content: space-between; font-size: 0.95rem; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .res-item b { color: var(--p); }

        /* Botones Flotantes */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 12px; z-index: 99; }
        .fab { width: 56px; height: 56px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.2s; }
        .fab:active { transform: scale(0.9); }
        .fab-p { background: var(--p); }
        .fab-f { background: #27ae60; }

        /* Modales */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; padding: 15px; overflow-y: auto; }
        .modal-c { background: white; border-radius: 20px; padding: 20px; max-width: 500px; margin: 20px auto; }
        .t-tag { padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; color: white; font-weight: bold; align-items: center; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; }
        
        .field-row { display: flex; gap: 5px; margin-bottom: 8px; background: #f9f9f9; padding: 8px; border-radius: 8px; align-items: center; }
        .field-row input { background: white; border-width: 1px; padding: 6px; }
        .field-row .i-l { flex: 1.2; }
        .field-row .i-f { flex: 2; font-family: monospace; }
    </style>
</head>
<body>

    <div id="vignettesContainer" class="vignettes-grid"></div>

    <div class="fab-container">
        <button class="fab fab-f" onclick="openM('mFirebase')">💾</button>
        <button class="fab fab-p" onclick="openM('mTemplates')">📄</button>
    </div>

    <div id="mTemplates" class="modal">
        <div class="modal-c">
            <h2 style="margin-bottom:15px">Plantillas</h2>
            <div id="listT"></div>
            <button class="btn" style="background:#8e44ad; color:white" onclick="editT()">+ Nueva Plantilla</button>
            <button class="btn" style="background:#95a5a6; color:white" onclick="closeM()">Cerrar</button>
        </div>
    </div>

    <div id="mEdit" class="modal">
        <div class="modal-c">
            <h3 id="edTitle" style="margin-bottom:10px">Editor de Plantilla</h3>
            <input type="hidden" id="edId">
            <label style="font-size:0.8rem; color:#666">Nombre y Color:</label>
            <div style="display:flex; gap:5px; margin-bottom:15px">
                <input type="text" id="edName" placeholder="Nombre (ej: Vigas)">
                <input type="color" id="edColor" style="width:60px; height:45px; padding:2px">
            </div>

            <div style="background:#eee; padding:10px; border-radius:10px; margin-bottom:15px">
                <p style="font-size:0.8rem; font-weight:bold; margin-bottom:5px">Variables a pedir:</p>
                <label style="margin-right:10px"><input type="checkbox" id="useX" checked disabled> X</label>
                <label style="margin-right:10px"><input type="checkbox" id="useY"> Y</label>
                <label><input type="checkbox" id="useZ"> Z</label>
            </div>

            <div id="edFields"></div>
            <button class="btn" style="background:#2ecc71; color:white" onclick="saveT()">Guardar Cambios</button>
            <button id="btnDel" class="btn" style="background:#e74c3c; color:white" onclick="delT()">Eliminar Plantilla</button>
            <button class="btn" style="background:#95a5a6; color:white" onclick="openM('mTemplates')">Cancelar</button>
        </div>
    </div>

    <div id="mFirebase" class="modal">
        <div class="modal-c">
            <h3>Sincronización</h3>
            <button class="btn" style="background:#3498db; color:white" onclick="fbSync('up')">⬆️ Subir a Firebase</button>
            <button class="btn" style="background:#27ae60; color:white" onclick="fbSync('down')">⬇️ Descargar de Firebase</button>
            <button class="btn" style="background:#95a5a6; color:white" onclick="closeM()">Cerrar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://autoformula-a2442-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let templates = JSON.parse(localStorage.getItem('t')) || [];
        let vignettes = JSON.parse(localStorage.getItem('v')) || [];

        const openM = id => { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); document.getElementById(id).style.display='block'; if(id=='mTemplates') renderT(); };
        const closeM = () => document.querySelectorAll('.modal').forEach(m=>m.style.display='none');

        function renderV() {
            const cont = document.getElementById('vignettesContainer');
            cont.innerHTML = vignettes.length ? '' : '<p style="text-align:center;width:100%;color:#888;margin-top:40px">Sin viñetas. Toca 📄 para empezar.</p>';
            vignettes.forEach(v => {
                const t = templates.find(temp => temp.id == v.tId);
                if (!t) return;
                
                let inpHtml = `<div><label>X</label><input type="number" value="${v.x}" oninput="updVal(${v.id},'x',this.value)"></div>`;
                if(t.useY) inpHtml += `<div><label>Y</label><input type="number" value="${v.y||0}" oninput="updVal(${v.id},'y',this.value)"></div>`;
                if(t.useZ) inpHtml += `<div><label>Z</label><input type="number" value="${v.z||0}" oninput="updVal(${v.id},'z',this.value)"></div>`;

                let resHtml = t.f.map((f, i) => `<div class="res-item"><span>${f.l}:</span><b id="r-${v.id}-${i}">${evalF(f.f, v.x, v.y, v.z)}</b></div>`).join('');

                cont.innerHTML += `
                    <div class="card">
                        <div class="card-h" style="background:${t.c}; color:${isDark(t.c)?'#fff':'#222'}">
                            <span>${t.n}</span>
                            <span onclick="delV(${v.id})" style="font-size:1.5rem; cursor:pointer">&times;</span>
                        </div>
                        <div class="card-b">
                            <div class="input-group">${inpHtml}</div>
                            <div>${resHtml}</div>
                        </div>
                    </div>`;
            });
        }

        function updVal(id, key, val) {
            const v = vignettes.find(x => x.id == id);
            v[key] = parseFloat(val) || 0;
            const t = templates.find(temp => temp.id == v.tId);
            t.f.forEach((f, i) => {
                const el = document.getElementById(`r-${v.id}-${i}`);
                if(el) el.innerText = evalF(f.f, v.x, v.y, v.z);
            });
            localStorage.setItem('v', JSON.stringify(vignettes));
        }

        function renderT() {
            document.getElementById('listT').innerHTML = templates.map(t => `
                <div class="t-tag" style="background:${t.c}">
                    <span onclick="spawnV(${t.id})" style="flex:1; cursor:pointer">📄 ${t.n}</span>
                    <button onclick="editT(${t.id})" style="background:none; border:none; color:inherit; font-size:1.3rem; cursor:pointer">✎</button>
                </div>`).join('');
        }

        function editT(id=null) {
            openM('mEdit');
            const t = templates.find(x => x.id == id) || { id:'', n:'', c:'#4a90e2', useY:false, useZ:false, f:[{l:'', f:''}] };
            document.getElementById('edId').value = t.id;
            document.getElementById('edName').value = t.n;
            document.getElementById('edColor').value = t.c;
            document.getElementById('useY').checked = t.useY;
            document.getElementById('useZ').checked = t.useZ;
            document.getElementById('btnDel').style.display = id ? 'block' : 'none';
            
            const fCont = document.getElementById('edFields');
            fCont.innerHTML = '<p style="font-size:0.8rem; margin-bottom:5px; font-weight:bold">Fórmulas de Resultado:</p>';
            
            t.f.forEach(f => addF(f.l, f.f));
            
            const btnAdd = document.createElement('button');
            btnAdd.className = 'btn';
            btnAdd.innerText = '+ Añadir Fórmula';
            btnAdd.onclick = () => addF();
            fCont.appendChild(btnAdd);
        }

        const addF = (l='', f='') => {
            const div = document.createElement('div');
            div.className = 'field-row';
            div.innerHTML = `
                <input placeholder="Etiqueta" class="i-l" value="${l}">
                <input placeholder="Fórmula" class="i-f" value="${f}">
                <button onclick="this.parentElement.remove()" style="border:none; background:none; color:red; font-size:1.2rem">&times;</button>
            `;
            const fCont = document.getElementById('edFields');
            fCont.insertBefore(div, fCont.lastElementChild);
        };

        function saveT() {
            const id = document.getElementById('edId').value || Date.now();
            const fieldRows = Array.from(document.querySelectorAll('.field-row'));
            
            const nt = {
                id: parseInt(id),
                n: document.getElementById('edName').value || 'Sin nombre',
                c: document.getElementById('edColor').value,
                useY: document.getElementById('useY').checked,
                useZ: document.getElementById('useZ').checked,
                f: fieldRows.map(r => ({
                    l: r.querySelector('.i-l').value || '?',
                    f: r.querySelector('.i-f').value.toLowerCase().replace(/\s/g, '')
                }))
            };

            const idx = templates.findIndex(x => x.id == id);
            if(idx > -1) templates[idx] = nt; else templates.push(nt);
            
            localStorage.setItem('t', JSON.stringify(templates));
            renderV(); 
            openM('mTemplates');
        }

        const spawnV = id => { vignettes.push({id:Date.now(), tId:id, x:0, y:0, z:0}); localStorage.setItem('v', JSON.stringify(vignettes)); renderV(); closeM(); };
        const delV = id => { if(confirm('¿Eliminar esta viñeta?')) { vignettes = vignettes.filter(x=>x.id!=id); localStorage.setItem('v', JSON.stringify(vignettes)); renderV(); }};
        const evalF = (f, x, y, z) => { try { return eval(f.replace(/x/g,`(${x})`).replace(/y/g,`(${y||0})`).replace(/z/g,`(${z||0})`)).toFixed(2); } catch { return '...'; }};
        const isDark = h => { let r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16); return (r*299+g*587+b*114)/1000 < 128; };
        const delT = () => { if(confirm('¿Borrar plantilla?')){ templates=templates.filter(x=>x.id!=document.getElementById('edId').value); localStorage.setItem('t', JSON.stringify(templates)); openM('mTemplates'); } };

        async function fbSync(mode) {
            try {
                if(mode=='up') await db.ref('plantillas').set(templates);
                else { const s = await db.ref('plantillas').once('value'); templates = Object.values(s.val() || {}); localStorage.setItem('t', JSON.stringify(templates)); }
                alert('Sincronización exitosa'); renderV(); closeM();
            } catch(e) { alert('Error: ' + e.message); }
        }

        renderV();
    </script>
</body>
</html>
